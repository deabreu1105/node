version: '3.8'

services:
  # Servidor MongoDB
  mongodb:
    image: mongo:7
    container_name: mongodb-server
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      # Expuesto en local para conectar desde otros servicios (Compass, apps, etc.)
      - "27017:27017"
    volumes:
      # Volumen para persistir los datos de la base de datos (descomentar si no se quiere usar el volumen nombrado)
      #- ./mongo:/data/db
      # Volumen para persistir los datos de la base de datos
      - mongodb-data:/data/db
      # Scripts de inicialización (se ejecutan solo la primera vez)
      - ./init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - mongodb-network

  # Cliente web Mongo Express para gestionar MongoDB
  mongo-express:
    image: mongo-express:latest
    container_name: mongodb-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - mongodb-network

volumes:
  mongodb-data:
    driver: local

networks:
  mongodb-network:
    name: mongodb-network
    driver: bridge